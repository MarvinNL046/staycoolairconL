name: Validate Build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      
    - name: Validate build consistency
      run: npm run validate:build
      
    - name: Check for cache issues
      run: |
        echo "Checking for potential cache issues..."
        node <<'NODE'
        const fs = require('fs');
        const path = require('path');

        const oldLogoPattern = /(^|["'(`])\/logo\.svg(?=$|["')?#])|https?:\/\/[^/"')?#]+\/logo\.svg(?=$|["')?#])/;

        function* files(dir) {
          for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
            const fullPath = path.join(dir, entry.name);
            if (entry.isDirectory()) {
              yield* files(fullPath);
            } else if (entry.name.endsWith('.html') || entry.name.endsWith('.js')) {
              yield fullPath;
            }
          }
        }

        for (const file of files('dist')) {
          const content = fs.readFileSync(file, 'utf8');
          if (oldLogoPattern.test(content)) {
            console.error(`❌ Found reference to old root logo.svg in ${file}`);
            process.exit(1);
          }
        }
        NODE
        if find dist/assets -name "*.js" | wc -l | grep -q "^0$"; then
          echo "❌ No JS files found in assets"
          exit 1
        fi
        echo "✅ No cache issues detected"
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/
        retention-days: 1
